<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Latihan CSS</title>
  <style>
    body {
      font-family: Arial;
      background-color: #111;
      color: white;
      padding: 20px;
    }
    .section {
      margin-bottom: 25px;
    }
    button {
      cursor: pointer;
      margin: 5px;
    }
    .uber {
      background-color: black;
      color: white;
      padding: 12px 20px;
      border: none;
    }
    .uber:hover {
      opacity: 0.7;
    }
    .amazon {
      background-color: rgb(255, 216, 20);
      border: none;
      padding: 12px 40px;
      border-radius: 20px;
    }
    .amazon:hover {
      background-color: rgb(245, 205, 3);
    }
    .github {
      background-color: rgb(46, 164, 79);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
    }
    .github:hover {
      box-shadow: 0 5px 10px rgba(0,0,0,0.5);
    }
    .bootstrap {
      background-color: rgb(121, 82, 179);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
    }
    .download {
      background-color: rgb(108, 117, 125);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
    }
    .linkedin {
      background-color: rgb(10, 102, 194);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 20px;
    }
    .save {
      background-color: white;
      color: rgb(10, 102, 194);
      border: 1px solid rgb(10, 102, 194);
      padding: 12px 20px;
      border-radius: 20px;
    }
    .linkedin:hover {
      background-color: rgb(8, 80, 160);
    }
    .save:hover {
      background-color: rgb(230, 240, 255);
    }
    .card {
      background-color: white;
      color: black;
      padding: 20px;
      width: 300px;
      border-radius: 5px;
    }
    .link {
      color: rgb(0, 113, 133);
      text-decoration: none;
    }
    .price {
      color: rgb(0, 118, 0);
      font-weight: bold;
    }
    .cart {
      background-color: rgb(255, 216, 20);
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
    }
    .buy {
      background-color: rgb(255, 164, 28);
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="section">
    <p>2a. Uber</p>
    <button class="uber">Request now</button>
  </div>
  <div class="section">
    <p>2b. Amazon</p>
    <button class="amazon">Add to Cart</button>
  </div>
  <div class="section">
    <p>2c. GitHub</p>
    <button class="github">Sign up</button>
  </div>
  <div class="section">
    <p>2d. Bootstrap</p>
    <button class="bootstrap">Get started</button>
    <button class="download">Download</button>
  </div>
  <div class="section">
    <p>2e. LinkedIn</p>
    <button class="linkedin">Apply on company website</button>
    <button class="save">Save</button>
  </div>
  <div class="section">
    <p>2f. Challenge</p>
    <div class="card">
      <a href="#" class="link">Back to Amazon</a>
      <h3>Nike Black Running Shoes</h3>
      <p class="price">$39 - in stock.</p>
      <p>Free delivery tomorrow.</p>
      <button class="cart">Add to Cart</button>
      <button class="buy">Buy now</button>
    </div>
  </div>
</body>
</html>
